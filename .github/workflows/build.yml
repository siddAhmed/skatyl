name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi

      - name: Cache QMK firmware
        id: cache-qmk
        uses: actions/cache@v4
        with:
          path: qmk_firmware
          # Invalidate when this workflow file changes (bump to force a fresh clone)
          key: qmk-rp2040-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Clone QMK firmware (shallow + RP2040 submodules only)
        if: steps.cache-qmk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/qmk/qmk_firmware.git
          cd qmk_firmware
          git submodule update --init --depth 1 \
            lib/chibios \
            lib/chibios-contrib \
            lib/printf \
            lib/pico-sdk \
            lib/lufa

      - name: Install QMK CLI and Python dependencies
        run: |
          pip install qmk
          pip install -r qmk_firmware/requirements.txt

      - name: Configure QMK home
        run: qmk config user.qmk_home=$GITHUB_WORKSPACE/qmk_firmware

      - name: Copy keyboard into QMK
        run: |
          mkdir -p qmk_firmware/keyboards/skatyl
          cp keyboard.json qmk_firmware/keyboards/skatyl/
          cp config.h      qmk_firmware/keyboards/skatyl/
          cp rules.mk      qmk_firmware/keyboards/skatyl/
          cp -r keymaps    qmk_firmware/keyboards/skatyl/

      - name: Compile no_numrow
        run: qmk compile -kb skatyl -km no_numrow

      - name: Collect firmware files
        run: |
          mkdir firmware
          find qmk_firmware -maxdepth 1 -name "*.uf2" -exec cp {} firmware/ \;
          echo "Built firmware:"
          ls -lh firmware/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skatyl-firmware-${{ github.ref_name }}
          path: firmware/*.uf2
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/*.uf2
          generate_release_notes: true
